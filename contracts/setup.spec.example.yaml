version: 0

repo:
  name: sample-node-api
  description: Proof repo contract for a Node.js API with PostgreSQL and a health check.

tools:
  - name: node
    version: 20.x
    required: true
  - name: pnpm
    version: 9.x
    required: true
  - name: docker
    version: 24+
    required: false
    notes: Docker is only needed when using the compose-backed Postgres option.

services:
  - name: postgres
    kind: postgres
    required: true
    strategy: one_of
    options:
      - id: docker-compose
        type: docker-compose
        command: docker compose up -d postgres
      - id: local-instance
        type: existing
        note: Use an already running local PostgreSQL instance.
    healthcheck:
      type: tcp
      target: localhost:5432

env:
  required_files:
    - path: .env
      example: .env.example
  required_vars:
    - name: DATABASE_URL
      source: .env.example
      description: Database connection string used by migrations and app startup.
    - name: PORT
      source: .env.example
      description: Local port exposed by the development server.

steps:
  - id: install
    name: Install dependencies
    run: pnpm install
  - id: start-postgres
    name: Start PostgreSQL
    run: docker compose up -d postgres
    notes: Skip this step when using the existing local Postgres option.
  - id: migrate
    name: Run database migrations
    run: pnpm db:migrate
  - id: start-app
    name: Start the API
    run: pnpm dev
    notes: Keep this process running while the health check is verified.

verify:
  - id: api-health
    name: Health endpoint responds
    type: http
    target: http://localhost:3000/health
    expect_status: 200
